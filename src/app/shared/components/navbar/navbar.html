<mat-toolbar color="primary">
  <span class="logo">T-Debt</span>

  <span class="spacer"></span>

  <a mat-button routerLink="/dashboard" routerLinkActive="active-link">Dashboard</a>
  <a mat-button routerLink="/debts" routerLinkActive="active-link">Debts</a>

  <span class="spacer"></span>

  <span class="user-email">{{ authService.user()?.sub }}</span>
  <button mat-icon-button (click)="onLogout()" aria-label="Logout">
    <mat-icon>logout</mat-icon>
  </button>
</mat-toolbar>
