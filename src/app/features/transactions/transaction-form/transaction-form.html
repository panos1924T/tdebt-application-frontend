<div class="form-container">
  <mat-card>
    <mat-card-header>
      <mat-card-title>New Transaction</mat-card-title>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <mat-form-field appearance="outline" class="full-width" subscriptSizing="dynamic">
          <mat-label>Date</mat-label>
          <input matInput [matDatepicker]="picker" formControlName="date">
          <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
          <mat-datepicker #picker></mat-datepicker>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width" subscriptSizing="dynamic">
          <mat-label>Amount</mat-label>
          <input matInput type="number" step="0.01" formControlName="amount">
          @if (form.get('amount')?.hasError('min') && form.get('amount')?.touched) {
            <mat-error>Amount must be greater than 0</mat-error>
          }
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width" subscriptSizing="dynamic">
          <mat-label>Action</mat-label>
          <mat-select formControlName="action">
            <mat-option value="INCREASE">Increase</mat-option>
            <mat-option value="DECREASE">Decrease</mat-option>
          </mat-select>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width" subscriptSizing="dynamic">
          <mat-label>Note</mat-label>
          <textarea matInput formControlName="note" rows="2"></textarea>
        </mat-form-field>

        @if (errorMessage) {
          <p class="error-msg">{{ errorMessage }}</p>
        }

        <div class="actions">
          <a mat-button [routerLink]="['/debts', debtUuid]">Cancel</a>
          <button mat-raised-button color="primary" type="submit">Create</button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
